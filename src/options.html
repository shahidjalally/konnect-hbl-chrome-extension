<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Konnect HBL QR Scanner Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Konnect HBL QR Scanner</h1>
      <p>Configure the license key and the GitHub-hosted license JSON endpoint.</p>

      <label>
        License key
        <input id="licenseKey" type="text" placeholder="KONNECT-DEMO-001" autocomplete="off" />
      </label>

      <label>
        Default depositor mobile number
        <input id="defaultMobileNumber" type="tel" placeholder="03000000000" autocomplete="off" />
      </label>

      <label>
        Remote license URL
        <input id="licenseEndpoint" type="url" />
      </label>

      <button id="save" type="button">Save settings</button>
      <p id="status" role="status"></p>
    </main>
    <script src="config.js"></script>
    <script src="options.js"></script>
  </body>
</html>
