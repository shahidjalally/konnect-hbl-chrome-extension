<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Konnect HBL QR Scanner</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Konnect HBL QR Scanner</h1>

    <script src="popup.js"></script>
  </body>
